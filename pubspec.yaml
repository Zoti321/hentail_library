name: hentai_library
description: "本地漫画(本子)管理库."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # ui/ux
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.9
  google_fonts: ^7.0.1
  flutter_animate: ^4.5.2 # 动画
  card_settings_ui: ^2.0.1
  material_color_utilities: ^0.11.0
  system_theme: ^3.1.2
  flutter_acrylic: ^1.1.4 # windows 亚克力效果
  custom_pop_up_menu: ^1.2.4

  async: ^2.11.0
  collection: ^1.0.8
  file_picker: ^10.3.3
  permission_handler: ^12.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  archive: ^3.6.1
  extended_image: ^10.0.1 # 高级图片加载
  crypto: ^3.0.3 # 哈希算法
  intl: ^0.20.2
  url_launcher: ^6.3.0 # 打开链接和本地资源管理器
  talker: ^5.1.13 # 日志记录
  epub_image_extractor: ^1.0.2 # epub 图片,元数据提取

  # sqlite 数据库
  drift: ^2.30.0
  drift_flutter: ^0.2.8

  flutter_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.0.3

  go_router: ^16.3.0

  window_manager: ^0.5.1
  tray_manager: ^0.5.2

  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  riverpod_annotation: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.4

  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3

  build_runner: ^2.10.4
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^3.0.3

  drift_dev: ^2.30.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: MI_Sans_Regular
      fonts:
        - asset: assets/fonts/MiSans-Regular.ttf
