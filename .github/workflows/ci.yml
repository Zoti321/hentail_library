name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.5"
  FRB_CODEGEN_VERSION: "2.12.0"

jobs:
  test-rust:
    name: test-rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          link-rust-builder: "false"
          run-frb-codegen: "false"
          run-build-runner: "false"
          run-pub-get: "false"

      - name: Run Rust workspace tests
        run: cargo test --manifest-path core/Cargo.toml

  analyze:
    name: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: Verify formatting
        working-directory: app
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: app
        run: flutter analyze

  test-unit:
    name: test-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: Run unit tests
        working-directory: app
        run: flutter test test/domain test/core test/project_layout_test.dart

  test-widget:
    name: test-widget
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: Run widget smoke test
        working-directory: app
        run: flutter test test/widget_test.dart
