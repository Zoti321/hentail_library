name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: read

env:
  FLUTTER_VERSION: "3.38.5"

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.verify.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CI checks and parse version
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/verify_ci_passed.sh

  build-windows:
    name: build-windows
    needs: gate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Apply version from tag
        shell: pwsh
        run: |
          $version = "${{ needs.gate.outputs.version }}"
          $build = "${{ github.run_number }}"
          (Get-Content pubspec.yaml) -replace '^version: .*', "version: ${version}+${build}" | Set-Content pubspec.yaml

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ needs.gate.outputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$version" installer.iss

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ needs.gate.outputs.version }}"
          $zip = "hentai_library_${version}_windows_x64_portable.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist_installer/*.exe
            hentai_library_*_windows_x64_portable.zip
          if-no-files-found: error

  build-macos:
    name: build-macos
    needs: gate
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Apply version from tag
        run: |
          version="${{ needs.gate.outputs.version }}"
          build="${{ github.run_number }}"
          sed -i '' "s/^version: .*/version: ${version}+${build}/" pubspec.yaml

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          version="${{ needs.gate.outputs.version }}"
          app_path="build/macos/Build/Products/Release/hentai_library.app"
          dmg_name="hentai_library_${version}_macos.dmg"
          hdiutil create -volname "hentai_library" -srcfolder "$app_path" -ov -format UDZO "$dmg_name"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: hentai_library_*_macos.dmg
          if-no-files-found: error

  build-linux:
    name: build-linux
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Apply version from tag
        run: |
          version="${{ needs.gate.outputs.version }}"
          build="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${version}+${build}/" pubspec.yaml

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          version="${{ needs.gate.outputs.version }}"
          archive="hentai_library_${version}_linux_x64.tar.gz"
          tar -czf "$archive" -C build/linux/x64/release bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: hentai_library_*_linux_x64.tar.gz
          if-no-files-found: error

  build-android:
    name: build-android
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Apply version from tag
        run: |
          version="${{ needs.gate.outputs.version }}"
          build="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${version}+${build}/" pubspec.yaml

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          version="${{ needs.gate.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk "hentai_library_${version}_android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: hentai_library_*_android.apk
          if-no-files-found: error

  build-ios:
    name: build-ios
    if: false
    needs: gate
    runs-on: macos-latest
    steps:
      - name: Skipped until Apple signing is configured
        run: echo "iOS release build is not enabled in phase 1."

  release:
    name: release
    needs:
      - gate
      - build-windows
      - build-macos
      - build-linux
      - build-android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-release"
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
