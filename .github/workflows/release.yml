name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (e.g. v1.2.3 or v1.0.0-beta.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as GitHub prerelease (also auto-detected from beta tags)"
        required: false
        type: boolean
        default: false
      release_notes_header:
        description: "Optional text prepended to auto-generated release notes"
        required: false
        type: string
        default: ""

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: read
  pull-requests: read

env:
  FLUTTER_VERSION: "3.38.5"

defaults:
  run:
    working-directory: app

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .
    outputs:
      version: ${{ steps.verify.outputs.version }}
      prerelease: ${{ steps.verify.outputs.prerelease }}
      tag: ${{ steps.verify.outputs.tag }}
      sha: ${{ steps.verify.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Verify CI checks and parse version
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          DISPATCH_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || '' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          export COMMIT_SHA="$(git rev-parse HEAD)"
          bash .github/scripts/verify_ci_passed.sh

  build-windows:
    name: build-windows
    needs: gate
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.tag }}

      - name: Prepare Flutter
        uses: ./.github/actions/flutter-prepare
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          version: ${{ needs.gate.outputs.version }}
          build-number: ${{ github.run_number }}

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ needs.gate.outputs.version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$version" "windows\packaging\installer.iss"

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ needs.gate.outputs.version }}"
          $zip = "hentai_library_${version}_windows_x64_portable.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            ../dist_installer/*.exe
            hentai_library_*_windows_x64_portable.zip
          if-no-files-found: error

  build-macos:
    name: build-macos
    needs: gate
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.tag }}

      - name: Prepare Flutter
        uses: ./.github/actions/flutter-prepare
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          version: ${{ needs.gate.outputs.version }}
          build-number: ${{ github.run_number }}
          enable-macos-desktop: "true"

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          version="${{ needs.gate.outputs.version }}"
          app_path="build/macos/Build/Products/Release/hentai_library.app"
          dmg_name="hentai_library_${version}_macos.dmg"
          hdiutil create -volname "hentai_library" -srcfolder "$app_path" -ov -format UDZO "$dmg_name"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: hentai_library_*_macos.dmg
          if-no-files-found: error

  build-linux:
    name: build-linux
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.tag }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Prepare Flutter
        uses: ./.github/actions/flutter-prepare
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          version: ${{ needs.gate.outputs.version }}
          build-number: ${{ github.run_number }}
          enable-linux-desktop: "true"

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package tar.gz
        run: |
          version="${{ needs.gate.outputs.version }}"
          archive="hentai_library_${version}_linux_x64.tar.gz"
          tar -czf "$archive" -C build/linux/x64/release bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: hentai_library_*_linux_x64.tar.gz
          if-no-files-found: error

  build-android:
    name: build-android
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.tag }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Flutter
        uses: ./.github/actions/flutter-prepare
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          version: ${{ needs.gate.outputs.version }}
          build-number: ${{ github.run_number }}

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          version="${{ needs.gate.outputs.version }}"
          cp build/app/outputs/flutter-apk/app-release.apk "hentai_library_${version}_android.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: hentai_library_*_android.apk
          if-no-files-found: error

  build-ios:
    name: build-ios
    if: false
    needs: gate
    runs-on: macos-latest
    steps:
      - name: Skipped until Apple signing is configured
        run: echo "iOS release build is not enabled in phase 1."

  release:
    name: release
    needs:
      - gate
      - build-windows
      - build-macos
      - build-linux
      - build-android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-release"
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          sha="${{ needs.gate.outputs.sha }}"
          header="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_notes_header || '' }}"
          generated="$(gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f "tag_name=${tag}" \
            -f "target_commitish=${sha}" \
            --jq .body)"
          {
            echo "body<<RELEASE_BODY"
            if [[ -n "${header}" ]]; then
              printf '%s\n\n%s' "${header}" "${generated}"
            else
              printf '%s' "${generated}"
            fi
            echo "RELEASE_BODY"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          target_commitish: ${{ needs.gate.outputs.sha }}
          prerelease: ${{ needs.gate.outputs.prerelease == 'true' }}
          body: ${{ steps.notes.outputs.body }}
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
