name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without v prefix (e.g. 0.1.0 or 0.1.0-beta.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as GitHub prerelease"
        required: false
        type: boolean
        default: false
      publish_release:
        description: "Create or update GitHub Release (default: artifacts only)"
        required: false
        type: boolean
        default: false
      release_notes_header:
        description: "Optional text prepended to auto-generated release notes"
        required: false
        type: string
        default: ""

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.38.5"
  FRB_CODEGEN_VERSION: "2.12.0"

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: cargo test
        run: cargo test --manifest-path core/Cargo.toml

      - name: flutter analyze
        working-directory: app
        run: flutter analyze

  build-windows:
    name: build-windows
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: flutter build windows
        working-directory: app
        run: >
          flutter build windows --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.name }}"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after Inno Setup install"
          }
          & $iscc `
            "/DMyAppVersion=$version" `
            "/DOutputDir=$dist" `
            "app\windows\packaging\installer.iss"

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.name }}"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          $zip = Join-Path $dist "hentai_library_${version}_windows_x64_portable.zip"
          Compress-Archive -Path "app\build\windows\x64\runner\Release\*" -DestinationPath $zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/hentai_library_*_windows_x64*.zip
            dist/hentai_library_*Setup*.exe

  build-macos:
    name: build-macos
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: flutter build macos
        working-directory: app
        run: >
          flutter build macos --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package macOS DMG
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          APP="app/build/macos/Build/Products/Release/hentai_library.app"
          mkdir -p dist
          hdiutil create -volname "hentai_library" -srcfolder "$APP" -ov -format UDZO \
            "dist/hentai_library_${VERSION}_macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/hentai_library_*_macos.dmg

  build-linux:
    name: build-linux
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: flutter build linux
        working-directory: app
        run: >
          flutter build linux --release
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package Linux bundle
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p dist
          tar -czf "dist/hentai_library_${VERSION}_linux_x64.tar.gz" \
            -C app/build/linux/x64/release bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/hentai_library_*_linux_x64.tar.gz

  build-android:
    name: build-android
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      - name: Configure Android release signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/android/upload-keystore.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > app/android/key.properties

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: flutter build apk
        working-directory: app
        run: >
          flutter build apk --release
          --target-platform android-arm64
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: Package Android APK
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p dist
          cp app/build/app/outputs/flutter-apk/app-release.apk \
            "dist/hentai_library_${VERSION}_android-arm64.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/hentai_library_*_android-arm64.apk

  build-ios:
    name: build-ios
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/flutter-frb-setup
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          frb-codegen-version: ${{ env.FRB_CODEGEN_VERSION }}
          run-build-runner: "true"

      # Phase 2: add ExportOptions.plist and flutter build ipa when secrets are configured.
      - name: Configure iOS release signing
        if: env.IOS_DISTRIBUTION_CERTIFICATE_BASE64 != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/distribution.p12"
          security import "$RUNNER_TEMP/distribution.p12" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" | plutil -extract UUID raw -)
          cp "$RUNNER_TEMP/profile.mobileprovision" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

      - name: flutter build ios (unsigned)
        if: env.IOS_DISTRIBUTION_CERTIFICATE_BASE64 == ''
        working-directory: app
        run: >
          flutter build ios --release --no-codesign
          --build-name=${{ steps.version.outputs.name }}
          --build-number=${{ github.run_number }}

      - name: flutter build ipa (signed)
        if: env.IOS_DISTRIBUTION_CERTIFICATE_BASE64 != ''
        working-directory: app
        run: |
          echo "::error::Signed iOS IPA requires ExportOptions.plist (phase 2)."
          exit 1

      - name: Package unsigned iOS app
        if: env.IOS_DISTRIBUTION_CERTIFICATE_BASE64 == ''
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "app/build/ios/iphoneos/Runner.app" \
            "dist/hentai_library_${VERSION}_ios-arm64-nosign.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            dist/hentai_library_*_ios-arm64-nosign.zip
            dist/hentai_library_*_ios-arm64.ipa

  release:
    name: release
    needs:
      - build-windows
      - build-macos
      - build-linux
      - build-android
      - build-ios
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: find dist -type f | sort

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
              prerelease="true"
            elif [[ "$version" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          else
            version="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
            if [[ "$version" == *-* ]]; then
              prerelease="true"
            else
              prerelease="false"
            fi
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="v${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          header="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_notes_header || '' }}"
          generated="$(gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f "tag_name=${tag}" \
            -f "target_commitish=${GITHUB_SHA}" \
            --jq .body)"
          ios_notice="> **iOS：** \`ios-arm64-nosign\` 为未签名包，无法直接安装到设备，仅供验证 CI 构建。"
          if [ -n "${header}" ]; then
            printf '%s\n\n%s\n\n%s' "${header}" "${ios_notice}" "${generated}" > release_body.md
          else
            printf '%s\n\n%s' "${ios_notice}" "${generated}" > release_body.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          body_path: release_body.md
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ github.token }}

  manual-summary:
    name: manual-summary
    needs:
      - build-windows
      - build-macos
      - build-linux
      - build-android
      - build-ios
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release != true
    runs-on: ubuntu-latest
    steps:
      - name: Manual build summary
        run: |
          echo "Manual release build completed."
          echo "Download platform artifacts from this workflow run (Artifacts tab)."
          echo "No GitHub Release was created."
